name: 'Aether Deploy'
description: 'Push React Native over-the-air updates with Aether'
author: 'Aether'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:

  access-key:
    description: |
      Aether API key for authentication. Generate one via `aether api-key add --scope deploy`
      or in the Aether dashboard, then store as a GitHub secret. Do not use session access
      keys created with `aether access-key add` — they invalidate when the owner resets their
      password and have a fixed 60-day expiration.
    required: true

  app-name:
    description: 'Name of the Aether app to release to.'
    required: true

  command:
    description: 'Which CLI command to run. One of: `release`, `release-react`.'
    required: false
    default: 'release-react'

  node-version:
    description: 'Node.js version installed by setup-node. The CLI requires Node 22 or newer.'
    required: false
    default: '22'

  api-url:
    description: |
      Override the Aether server URL. Leave empty for the CLI built-in default (production).
      Set to a custom Aether server URL (e.g. a staging environment) to override.
    required: false
    default: ''

  working-directory:
    description: |
      Directory to run the CLI from, relative to the repository root. Useful for
      monorepos where the React Native project lives in a subdirectory
      (e.g. `apps/mobile`). Relative paths such as `update-contents-path` are
      resolved from here. Defaults to the repository root.
    required: false
    default: '.'

  deployment-name:
    description: 'Aether deployment channel to release into.'
    required: false
    default: 'Staging'

  description:
    description: 'Release description (free text). If `ci-metadata` is on, the CLI appends a `[ci=...]` bracket.'
    required: false
    default: ''

  mandatory:
    description: 'Mark the release as mandatory. The SDK forces install on clients.'
    required: false
    default: 'false'

  rollout:
    description: 'Percentage of clients eligible for this release (e.g. `100%`, `25%`).'
    required: false
    default: '100%'

  disabled:
    description: 'Upload the release in a disabled state. It will not be served until enabled.'
    required: false
    default: 'false'

  no-duplicate-release-error:
    description: 'When set to `true`, releasing an identical package produces a warning instead of an error.'
    required: false
    default: 'false'

  ci-metadata:
    description: |
      Enrich the release description with CI metadata (`[ci=github sha=... branch=... pr=... run=...]`).
      The CLI auto-detects GitHub Actions. Set to `false` to opt out.
    required: false
    default: 'true'

  force:
    description: 'Skip the CLI confirmation prompts for destructive operations.'
    required: false
    default: 'false'

  update-contents-path:
    description: |
      `release` only. Path to the bundle file or directory to upload.
      Required when `command` is `release`. Ignored for `release-react`.
    required: false
    default: ''

  target-binary-version:
    description: |
      Semver range of native binary versions this release targets (e.g. `1.0.0`, `~1.2.0`, `>=2.0.0 <3.0.0`).
      Required for `release`. For `release-react`, omit to read the version from the project
      (`Info.plist` on iOS, `build.gradle` on Android).
    required: false
    default: ''

  platform:
    description: '`release-react` only. Target platform. One of: `ios`, `android`.'
    required: false
    default: ''

  bundle-name:
    description: '`release-react` only. JS bundle filename. Defaults to `main.jsbundle` (iOS) or `index.android.bundle` (Android).'
    required: false
    default: ''

  entry-file:
    description: '`release-react` only. Path to the app entry JS file. Defaults to `index.<platform>.js`, falling back to `index.js`.'
    required: false
    default: ''

  gradle-file:
    description: '`release-react` only (Android). Path to the gradle file specifying the binary version.'
    required: false
    default: ''

  plist-file:
    description: '`release-react` only (iOS). Path to the plist file specifying the binary version.'
    required: false
    default: ''

  use-hermes:
    description: '`release-react` only. Enable Hermes and bypass automatic detection checks.'
    required: false
    default: 'false'

  development:
    description: '`release-react` only. Build a development bundle instead of release.'
    required: false
    default: 'false'

  output-dir:
    description: '`release-react` only. Directory to write the bundle and sourcemap to.'
    required: false
    default: ''

  sourcemap-output:
    description: '`release-react` only. Path to write the sourcemap to. Omit to skip sourcemap generation.'
    required: false
    default: ''

  private-key-path:
    description: '`release-react` only. Path to the private key for code signing.'
    required: false
    default: ''

outputs:

  status:
    description: '`success` if the release completed and the CLI emitted a valid JSON payload; `failure` otherwise.'
    value: ${{ steps.aether.outputs.status }}

  label:
    description: 'Release label assigned by the server (e.g. `v4`).'
    value: ${{ steps.aether.outputs.label }}

  package-hash:
    description: 'SHA-256 hash of the released package contents.'
    value: ${{ steps.aether.outputs.package-hash }}

  size:
    description: 'Package size in bytes.'
    value: ${{ steps.aether.outputs.size }}

  app-version:
    description: 'Binary app version (or range) the release targets.'
    value: ${{ steps.aether.outputs.app-version }}

  blob-url:
    description: 'Signed URL to download the package bundle. Time-limited — not a CDN URL.'
    value: ${{ steps.aether.outputs.blob-url }}

  manifest-blob-url:
    description: 'Signed URL to the package manifest (file hash map).'
    value: ${{ steps.aether.outputs.manifest-blob-url }}

  description:
    description: 'Final release description as stored on the server, with the `[ci=...]` bracket appended when applicable.'
    value: ${{ steps.aether.outputs.description }}

  released-by:
    description: 'Email of the account that owns the API key used to release.'
    value: ${{ steps.aether.outputs.released-by }}

  release-method:
    description: 'How the release was produced. One of: `Upload`, `Promote`, `Rollback`.'
    value: ${{ steps.aether.outputs.release-method }}

  upload-time:
    description: 'Unix timestamp in milliseconds when the release was committed.'
    value: ${{ steps.aether.outputs.upload-time }}

  rollout:
    description: 'Rollout percentage as a string (e.g. `25`). Empty when the rollout is complete.'
    value: ${{ steps.aether.outputs.rollout }}

  is-mandatory:
    description: '`true` or `false` — whether the release is mandatory.'
    value: ${{ steps.aether.outputs.is-mandatory }}

  is-disabled:
    description: '`true` or `false` — whether the release is disabled.'
    value: ${{ steps.aether.outputs.is-disabled }}

runs:
  using: 'composite'
  steps:

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Mask access key in logs
      shell: bash
      env:
        ACCESS_KEY: ${{ inputs.access-key }}
      run: echo "::add-mask::$ACCESS_KEY"

    - name: Install Aether CLI
      shell: bash
      run: npm install -g @aetherpush/cli@0.3.2

    - name: Verify CLI version matches pin
      shell: bash
      run: |
        set -euo pipefail
        EXPECTED="0.3.2"
        INSTALLED=$(aether --version 2>/dev/null | tr -d ' \r\n')
        if [ "$INSTALLED" != "$EXPECTED" ]; then
          echo "::error::Installed CLI version '$INSTALLED' does not match expected '$EXPECTED'. Check npm registry and cache."
          exit 1
        fi

    - name: Login to Aether
      shell: bash
      env:
        ACCESS_KEY: ${{ inputs.access-key }}
        API_URL: ${{ inputs.api-url }}
      run: |
        set -euo pipefail
        args=(--accessKey "$ACCESS_KEY")
        if [ -n "$API_URL" ]; then
          args+=(--serverUrl "$API_URL")
        fi
        aether login "${args[@]}"

    - name: Run aether
      id: aether
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
        WORKING_DIR: ${{ inputs.working-directory }}
        APP_NAME: ${{ inputs.app-name }}
        UPDATE_PATH: ${{ inputs.update-contents-path }}
        TARGET_BIN: ${{ inputs.target-binary-version }}
        PLATFORM: ${{ inputs.platform }}
        DEPLOYMENT_NAME: ${{ inputs.deployment-name }}
        DESCRIPTION: ${{ inputs.description }}
        MANDATORY: ${{ inputs.mandatory }}
        ROLLOUT: ${{ inputs.rollout }}
        DISABLED: ${{ inputs.disabled }}
        NO_DUP: ${{ inputs.no-duplicate-release-error }}
        FORCE: ${{ inputs.force }}
        CI_METADATA: ${{ inputs.ci-metadata }}
        BUNDLE_NAME: ${{ inputs.bundle-name }}
        ENTRY_FILE: ${{ inputs.entry-file }}
        GRADLE_FILE: ${{ inputs.gradle-file }}
        PLIST_FILE: ${{ inputs.plist-file }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        SOURCEMAP_OUTPUT: ${{ inputs.sourcemap-output }}
        PRIVATE_KEY_PATH: ${{ inputs.private-key-path }}
        USE_HERMES: ${{ inputs.use-hermes }}
        DEVELOPMENT: ${{ inputs.development }}
      run: |
        set -euo pipefail

        echo "status=failure" >> "$GITHUB_OUTPUT"

        cd "$WORKING_DIR" || { echo "::error::working-directory '$WORKING_DIR' does not exist."; exit 1; }

        case "$COMMAND" in
          release)
            if [ -z "$UPDATE_PATH" ]; then
              echo "::error::Input 'update-contents-path' is required when command is 'release'"
              exit 1
            fi
            if [ -z "$TARGET_BIN" ]; then
              echo "::error::Input 'target-binary-version' is required when command is 'release'"
              exit 1
            fi
            args=("$APP_NAME" "$UPDATE_PATH" "$TARGET_BIN")
            args+=(-d "$DEPLOYMENT_NAME" -r "$ROLLOUT")
            [ -n "$DESCRIPTION" ] && args+=(--description "$DESCRIPTION")
            [ "$MANDATORY" = "true" ] && args+=(-m)
            [ "$DISABLED" = "true" ] && args+=(-x)
            [ "$NO_DUP" = "true" ] && args+=(--noDuplicateReleaseError)
            [ "$FORCE" = "true" ] && args+=(--force)
            [ "$CI_METADATA" = "false" ] && args+=(--no-ci-metadata)
            args+=(--json)
            echo "Running: aether release ${args[*]}"
            aether release "${args[@]}" > release.json
            ;;
          release-react)
            if [ -z "$PLATFORM" ]; then
              echo "::error::Input 'platform' is required when command is 'release-react'"
              exit 1
            fi
            if [ "$PLATFORM" != "ios" ] && [ "$PLATFORM" != "android" ]; then
              echo "::error::Input 'platform' must be 'ios' or 'android', got '$PLATFORM'"
              exit 1
            fi
            args=("$APP_NAME" "$PLATFORM")
            args+=(-d "$DEPLOYMENT_NAME" -r "$ROLLOUT")
            [ -n "$DESCRIPTION" ] && args+=(--description "$DESCRIPTION")
            [ -n "$TARGET_BIN" ] && args+=(-t "$TARGET_BIN")
            [ -n "$BUNDLE_NAME" ] && args+=(-b "$BUNDLE_NAME")
            [ -n "$ENTRY_FILE" ] && args+=(-e "$ENTRY_FILE")
            [ -n "$GRADLE_FILE" ] && args+=(-g "$GRADLE_FILE")
            [ -n "$PLIST_FILE" ] && args+=(-p "$PLIST_FILE")
            [ -n "$OUTPUT_DIR" ] && args+=(-o "$OUTPUT_DIR")
            [ -n "$SOURCEMAP_OUTPUT" ] && args+=(-s "$SOURCEMAP_OUTPUT")
            [ -n "$PRIVATE_KEY_PATH" ] && args+=(-k "$PRIVATE_KEY_PATH")
            [ "$USE_HERMES" = "true" ] && args+=(--useHermes)
            [ "$DEVELOPMENT" = "true" ] && args+=(--development)
            [ "$MANDATORY" = "true" ] && args+=(-m)
            [ "$DISABLED" = "true" ] && args+=(-x)
            [ "$NO_DUP" = "true" ] && args+=(--noDuplicateReleaseError)
            [ "$FORCE" = "true" ] && args+=(--force)
            [ "$CI_METADATA" = "false" ] && args+=(--no-ci-metadata)
            args+=(--json)
            echo "Running: aether release-react ${args[*]}"
            aether release-react "${args[@]}" > release.json
            ;;
          *)
            echo "::error::Invalid command '$COMMAND'. Must be 'release' or 'release-react'."
            exit 1
            ;;
        esac

        if ! jq -e . release.json > /dev/null 2>&1; then
          echo "::error::CLI returned exit 0 but emitted invalid JSON. This indicates a CLI bug — please report."
          exit 1
        fi

        emit() {
          local key="$1" val="$2"
          if [[ "$val" == *$'\n'* ]]; then
            {
              echo "${key}<<__AETHER_EOF__"
              echo "$val"
              echo "__AETHER_EOF__"
            } >> "$GITHUB_OUTPUT"
          else
            echo "${key}=${val}" >> "$GITHUB_OUTPUT"
          fi
        }

        emit label             "$(jq -r '.label // empty' release.json)"
        emit package-hash      "$(jq -r '.packageHash // empty' release.json)"
        emit size              "$(jq -r '.size // empty' release.json)"
        emit app-version       "$(jq -r '.appVersion // empty' release.json)"
        emit blob-url          "$(jq -r '.blobUrl // empty' release.json)"
        emit manifest-blob-url "$(jq -r '.manifestBlobUrl // empty' release.json)"
        emit description       "$(jq -r '.description // empty' release.json)"
        emit released-by       "$(jq -r '.releasedBy // empty' release.json)"
        emit release-method    "$(jq -r '.releaseMethod // empty' release.json)"
        emit upload-time       "$(jq -r '.uploadTime // empty' release.json)"
        emit rollout           "$(jq -r '.rollout // empty' release.json)"
        emit is-mandatory      "$(jq -r '.isMandatory // false' release.json)"
        emit is-disabled       "$(jq -r '.isDisabled // false' release.json)"

        echo "status=success" >> "$GITHUB_OUTPUT"
