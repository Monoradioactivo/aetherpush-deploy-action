name: CI

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --user yamllint

      - name: Lint action.yml and workflows
        run: |
          cat > /tmp/yamllint-config.yml <<'EOF'
          extends: default
          rules:
            line-length:
              max: 200
              level: warning
            comments-indentation: disable
            document-start: disable
            truthy:
              check-keys: false
            indentation:
              spaces: 2
              indent-sequences: consistent
          EOF
          yamllint -c /tmp/yamllint-config.yml action.yml .github/workflows/
